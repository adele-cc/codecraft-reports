<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekly Report | CodeCraft</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  @font-face {
    font-family: 'Hubot Sans';
    src: url('https://cdn.jsdelivr.net/npm/@github/hubot-sans@1/fonts/variable/HubotSans.woff2') format('woff2');
    font-weight: 200 900; font-style: normal; font-display: swap;
  }
  :root {
    --bg:#000; --card:#0a0a0a; --border:#1a1a1a;
    --w:#fff; --w80:rgba(255,255,255,.8); --w50:rgba(255,255,255,.5);
    --w30:rgba(255,255,255,.3); --w10:rgba(255,255,255,.1); --w05:rgba(255,255,255,.05);
    --green:#88F802; --gd:rgba(136,248,2,.12); --g20:rgba(136,248,2,.2);
    --blue:#2D2AE0; --red:#ff4444; --rd:rgba(255,68,68,.12);
    --hd:'Hubot Sans','Montserrat',sans-serif; --bd:'Montserrat',sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:var(--bd);background:var(--bg);color:var(--w);line-height:1.6;-webkit-font-smoothing:antialiased}

  /* PIN GATE */
  .gate{position:fixed;inset:0;z-index:1000;background:#000;display:flex;align-items:center;justify-content:center;flex-direction:column;transition:opacity .4s}
  .gate.gone{opacity:0;pointer-events:none}
  .gate-logo{height:34px;margin-bottom:44px;opacity:.85}
  .gate-title{font-family:var(--hd);font-size:17px;font-weight:700;margin-bottom:5px}
  .gate-sub{font-size:12px;color:var(--w50);margin-bottom:36px;text-align:center;max-width:260px}
  .pin-row{display:flex;gap:12px;margin-bottom:16px}
  .pin-box{width:54px;height:62px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--w);font-family:var(--hd);font-size:30px;font-weight:800;text-align:center;outline:none;caret-color:var(--green);transition:border-color .2s}
  .pin-box:focus{border-color:var(--green)}
  .pin-err{font-size:12px;color:var(--red);min-height:16px;text-align:center}
  .pin-hint{font-size:11px;color:var(--w30);margin-top:28px;text-align:center;max-width:240px}

  /* NOT PUBLISHED */
  .np{position:fixed;inset:0;z-index:999;background:#000;display:none;align-items:center;justify-content:center;flex-direction:column;gap:10px}
  .np.show{display:flex}
  .np-icon{font-size:44px;margin-bottom:10px}
  .np-title{font-family:var(--hd);font-size:19px;font-weight:700}
  .np-sub{font-size:13px;color:var(--w50);text-align:center;max-width:300px}

  /* SCROLL REVEAL */
  .reveal{opacity:0;transform:translateY(22px);transition:opacity .65s ease,transform .65s ease}
  .reveal.on{opacity:1;transform:translateY(0)}

  /* HEADER */
  .hdr{display:flex;justify-content:space-between;align-items:center;padding:22px 48px;border-bottom:1px solid var(--border);position:sticky;top:0;background:rgba(0,0,0,.93);backdrop-filter:blur(14px);z-index:100}
  .hdr-l{display:flex;align-items:center;gap:16px}
  .hdr-cc{height:28px;opacity:.9}
  .hdr-div{width:1px;height:24px;background:var(--border)}
  .hdr-cl{height:28px}
  .hdr-r{text-align:right}
  .hdr-name{font-family:var(--hd);font-size:20px;font-weight:700;letter-spacing:-.5px}
  .hdr-week{display:flex;align-items:center;justify-content:flex-end;gap:6px;font-size:11px;color:var(--w50);margin-top:3px}
  .hdr-dot{width:6px;height:6px;border-radius:50%;background:var(--green)}

  /* CONTAINER */
  .wrap{max-width:1360px;margin:0 auto;padding:52px 28px 100px}

  /* SECTION */
  .sec{margin-bottom:64px}
  .sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;padding-bottom:12px;border-bottom:1px solid var(--border)}
  .sec-title{font-family:var(--hd);font-size:12px;font-weight:700;color:var(--w50);text-transform:uppercase;letter-spacing:2.5px;display:flex;align-items:center;gap:10px}
  .sec-bar{width:3px;height:14px;background:var(--green);border-radius:2px;flex-shrink:0}
  .badge{font-size:10px;font-weight:600;padding:3px 10px;border-radius:20px;letter-spacing:.5px}
  .b-up{background:var(--gd);color:var(--green);border:1px solid var(--g20)}
  .b-neu{background:var(--w05);color:var(--w50);border:1px solid var(--border)}
  .b-dn{background:var(--rd);color:#ff7a7a;border:1px solid rgba(255,68,68,.2)}

  /* OVERVIEW HERO */
  .ov-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  .ov-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:36px 28px 28px;position:relative;overflow:hidden;transition:border-color .3s,box-shadow .3s}
  .ov-card:hover{border-color:var(--g20);box-shadow:0 0 80px rgba(136,248,2,.06)}
  .ov-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--green),transparent);opacity:.4}
  .ov-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--green),var(--blue));opacity:.6}
  .ov-lbl{font-size:10px;font-weight:700;color:var(--w50);text-transform:uppercase;letter-spacing:2px;margin-bottom:14px}
  .ov-val{font-family:var(--hd);font-size:66px;font-weight:800;letter-spacing:-3px;line-height:1;margin-bottom:22px;color:var(--w)}
  .ov-deltas{display:flex;flex-direction:column;gap:7px}
  .ov-chip{position:absolute;top:18px;right:18px;font-family:var(--hd);font-size:10px;font-weight:700;color:var(--green);background:var(--gd);border:1px solid var(--g20);border-radius:20px;padding:3px 10px;letter-spacing:.5px}

  /* METRIC GRID */
  .mgrid{display:grid;gap:12px}
  .m2{grid-template-columns:1fr 1fr}
  .m3{grid-template-columns:repeat(3,1fr)}
  .m4{grid-template-columns:repeat(4,1fr)}
  .m5{grid-template-columns:repeat(5,1fr)}
  .mcard{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:22px;transition:border-color .3s}
  .mcard:hover{border-color:var(--w10)}
  .m-lbl{font-size:10px;font-weight:600;color:var(--w50);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
  .m-val{font-family:var(--hd);font-size:36px;font-weight:800;letter-spacing:-1.5px;line-height:1;margin-bottom:10px}
  .m-val.sm{font-size:28px;letter-spacing:-1px}
  .m-deltas{display:flex;flex-direction:column;gap:5px}

  /* DELTAS */
  .d{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:3px 8px;border-radius:6px;width:fit-content}
  .d.up{background:var(--gd);color:var(--green)}
  .d.dn{background:var(--rd);color:#ff7a7a}
  .d.neu{background:var(--w05);color:var(--w50)}
  .d-lbl{font-size:10px;font-weight:400;opacity:.7}

  /* COOKIE GAUGE */
  .cookie-layout{display:grid;grid-template-columns:1fr 1fr;gap:12px;align-items:start}
  .gauge-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:32px;display:flex;flex-direction:column;align-items:center}
  .gauge-canvas{display:block}
  .gauge-score{font-family:var(--hd);font-size:58px;font-weight:800;letter-spacing:-2px;line-height:1;margin-top:-6px;text-align:center}
  .gauge-sub{font-size:11px;color:var(--w30);text-align:center;margin-bottom:16px}
  .gauge-deltas{display:flex;flex-direction:column;gap:6px;align-items:center}

  /* ENGAGERS */
  .eng-list{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
  .eng-pill{display:flex;align-items:center;gap:7px;background:var(--w05);border:1px solid var(--border);border-radius:20px;padding:5px 12px 5px 7px;font-size:12px;color:var(--w80);transition:border-color .2s}
  .eng-pill:hover{border-color:var(--g20)}
  .eng-num{width:18px;height:18px;border-radius:50%;background:var(--green);color:#000;font-size:9px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}

  /* PROGRESS BAR */
  .prog-wrap{margin-top:10px}
  .prog-row{display:flex;align-items:center;gap:8px;margin-bottom:4px}
  .prog-bg{flex:1;background:var(--w05);border-radius:4px;height:4px;overflow:hidden}
  .prog-fill{height:100%;border-radius:4px;background:var(--green);width:0;transition:width 1.4s cubic-bezier(.4,0,.2,1)}
  .prog-label{font-size:10px;color:var(--w30);min-width:60px;text-align:right}

  /* DISCORD LAYOUT */
  .discord-layout{display:grid;grid-template-columns:1fr 1fr;gap:12px}

  /* LAYOUTS */
  .g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}

  /* FOOTER */
  .foot{text-align:center;padding:32px;border-top:1px solid var(--border)}
  .foot img{height:22px;opacity:.22}
  .foot p{font-size:10px;color:var(--w30);margin-top:6px}

  @keyframes spin{to{transform:rotate(360deg)}}

  @media(max-width:1100px){
    .ov-grid{grid-template-columns:1fr 1fr}
  }
  @media(max-width:960px){
    .ov-grid,.m3,.m4,.m5,.g2,.g3,.cookie-layout,.discord-layout{grid-template-columns:1fr!important}
    .m2{grid-template-columns:1fr 1fr}
    .ov-val{font-size:52px}
    .hdr{flex-direction:column;gap:12px;padding:18px;text-align:center}
    .hdr-r,.hdr-week{justify-content:center;text-align:center}
    .wrap{padding:24px 14px 80px}
  }
</style>
</head>
<body>

<!-- PIN GATE -->
<div class="gate" id="gate">
  <img src="logo/CC-full-logo-white.png" class="gate-logo" alt="CodeCraft">
  <div class="gate-title">Weekly Report</div>
  <div class="gate-sub" id="gateSub">Enter your 4-digit access code</div>
  <div class="pin-row">
    <input class="pin-box" type="password" maxlength="1" inputmode="numeric" id="p0">
    <input class="pin-box" type="password" maxlength="1" inputmode="numeric" id="p1">
    <input class="pin-box" type="password" maxlength="1" inputmode="numeric" id="p2">
    <input class="pin-box" type="password" maxlength="1" inputmode="numeric" id="p3">
  </div>
  <div class="pin-err" id="pinErr"></div>
  <div class="pin-hint">Your access code was provided by your CodeCraft account manager</div>
</div>

<!-- LOADING -->
<div class="gate" id="loading" style="display:none">
  <img src="logo/CC-full-logo-white.png" class="gate-logo" alt="CodeCraft">
  <div style="width:32px;height:32px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;margin-top:8px"></div>
</div>

<!-- NOT PUBLISHED -->
<div class="np" id="np">
  <div class="np-icon">🔒</div>
  <div class="np-title">Report not yet available</div>
  <div class="np-sub">Your account manager will share this before your next call.</div>
</div>

<!-- HEADER -->
<div class="hdr" id="hdr" style="display:none">
  <div class="hdr-l">
    <img src="logo/CC-full-logo-white.png" class="hdr-cc" alt="CodeCraft">
    <div class="hdr-div" id="hdrDiv" style="display:none"></div>
    <img class="hdr-cl" id="hdrCl" style="display:none" alt="">
  </div>
  <div class="hdr-r">
    <div class="hdr-name" id="hdrName"></div>
    <div class="hdr-week"><span class="hdr-dot"></span><span id="hdrWeek"></span></div>
  </div>
</div>

<!-- MAIN -->
<div class="wrap" id="main" style="display:none">

  <!-- OVERVIEW -->
  <div class="sec reveal" id="secOv">
    <div class="sec-hdr">
      <div class="sec-title"><span class="sec-bar"></span>Overview</div>
      <span class="badge b-neu" id="bdgOv"></span>
    </div>
    <div id="ovGrid" class="ov-grid"></div>
  </div>

  <!-- X / TWITTER -->
  <div class="sec reveal" id="secX">
    <div class="sec-hdr">
      <div class="sec-title"><span class="sec-bar"></span>X / Twitter</div>
      <span class="badge" id="bdgX"></span>
    </div>
    <div id="xMetrics" class="mgrid m5"></div>
  </div>

  <!-- DISCORD -->
  <div class="sec reveal" id="secDiscord">
    <div class="sec-hdr">
      <div class="sec-title"><span class="sec-bar"></span>Discord</div>
      <span class="badge" id="bdgDiscord"></span>
    </div>
    <div class="discord-layout">
      <div id="discordStats" class="mgrid m2"></div>
      <div id="discordEng"></div>
    </div>
  </div>

  <!-- COOKIE3 -->
  <div class="sec reveal" id="secCookie">
    <div class="sec-hdr">
      <div class="sec-title"><span class="sec-bar"></span>Cookie3</div>
      <span class="badge" id="bdgCookie"></span>
    </div>
    <div class="cookie-layout">
      <div id="cookieGauge"></div>
      <div id="cookieMetrics" class="mgrid m2"></div>
    </div>
  </div>

  <!-- GROWTH -->
  <div class="sec reveal" id="secGrowth">
    <div class="sec-hdr">
      <div class="sec-title"><span class="sec-bar"></span>Growth</div>
      <span class="badge" id="bdgGrowth"></span>
    </div>
    <div id="growthMetrics" class="mgrid m4"></div>
  </div>

  <!-- MINDSHARE -->
  <div class="sec reveal" id="secMind">
    <div class="sec-hdr">
      <div class="sec-title"><span class="sec-bar"></span>Mindshare</div>
      <span class="badge" id="bdgMind"></span>
    </div>
    <div id="mindMetrics" class="mgrid m4"></div>
  </div>

</div>

<!-- FOOTER -->
<div class="foot" id="foot" style="display:none">
  <img src="logo/CC-symbol-white.png" alt="CodeCraft">
  <p>Prepared by CodeCraft &bull; <span id="footWeek"></span></p>
</div>

<script>
/*CC_DATA_INJECT_START*/
const D = {
  client:       "Moviton",
  clientLogo:   null,
  pin:          "1234",
  published:    true,
  week:         5,
  weekDate:     "Week of May 5 2026",
  campaignStart:"Feb 1 2026",

  overview: {
    followers: { now: 89142,  lw: 87500, start: 45000 },
    discord:   { now: 12400,  lw: 11800, start: 8200  },
    cookie:    { now: 72,     lw: 68,    start: 45    },
    collabs:   { now: 24,     lw: 18,    start: 0     }
  },

  x: {
    followers:   { now: 89142,   lw: 87500,  start: 45000  },
    impressions: { now: 1240000, lw: 980000, start: 320000 },
    engagements: { now: 45200,   lw: 38400,  start: 12000  },
    verified:    { now: 3240,    lw: 3100,   start: 1200   },
    mutual:      { now: 2140,    lw: 1900,   start: 800    }
  },

  discord: {
    members:     { now: 12400, lw: 11800, start: 8200  },
    messages:    { now: 45600, lw: 38200, start: 15000 },
    topEngagers: ["@genesis_whale","@cryptobuilder","@defi_degen","@moonhunter","@quant_bro","@nft_visionary","@chain_maxi","@alpha_seeker"]
  },

  cookie3: {
    score:     { now: 72,     lw: 68,     start: 45    },
    smart:     { now: 4200,   lw: 3900,   start: 1800  },
    reach:     { now: "1.2M", lw: "980k", start: "400k"},
    viewsPost: { now: 12400,  lw: 10200,  start: 4500  },
    engTweet:  { now: "3.2%", lw: "2.9%", start: "1.8%"}
  },

  growth: {
    collabs:    { now: 24,    lw: 18,    start: 0    },
    registered: { now: 8400,  lw: 7200,  start: 3100 },
    dau:        { now: 1840,  lw: 1620,  start: 820  },
    mau:        { now: 12400, lw: 11200, start: 6800 }
  },

  mindshare: {
    uniqueEngagers: { now: 4200,    lw: 3800,    start: 1200   },
    posts:          { now: 840,     lw: 720,     start: 280    },
    quotePosts:     { now: 320,     lw: 280,     start: 90     },
    impressions:    { now: 2400000, lw: 1980000, start: 680000 }
  }
};
/*CC_DATA_INJECT_END*/

// ── UTILS ────────────────────────────────────────────────────────────────────
const v   = x => x !== null && x !== undefined && x !== "";
const fmt = n => {
  if (typeof n === 'string') return n;
  if (n >= 1e9) return (n/1e9).toFixed(1).replace(/\.0$/,'')+'B';
  if (n >= 1e6) return (n/1e6).toFixed(1).replace(/\.0$/,'')+'M';
  if (n >= 1e3) return (n/1e3).toFixed(1).replace(/\.0$/,'')+'k';
  return n.toLocaleString();
};

const numDelta = (now, ref) => {
  if (!v(ref) || typeof now !== 'number' || typeof ref !== 'number') return null;
  const diff = now - ref, pct = ref > 0 ? ((diff/ref)*100).toFixed(1) : null;
  return { diff, pct, up: diff >= 0 };
};

const dBadge = (now, ref, label) => {
  if (!v(ref)) return '';
  if (typeof now === 'string') {
    const n = parseFloat(now), r = parseFloat(ref);
    if (!isNaN(n) && !isNaN(r)) {
      const up = n >= r;
      return `<span class="d ${up?'up':'dn'}">${up?'↑':'↓'} ${ref} → ${now} <span class="d-lbl">${label}</span></span>`;
    }
    return v(ref) ? `<span class="d neu">${ref} → ${now} <span class="d-lbl">${label}</span></span>` : '';
  }
  const d = numDelta(now, ref); if (!d) return '';
  const sign = d.up?'+':'', cls = d.up?'up':'dn', arr = d.up?'↑':'↓';
  return `<span class="d ${cls}">${arr} ${sign}${fmt(d.diff)}${d.pct?` (${sign}${d.pct}%)`:''} <span class="d-lbl">${label}</span></span>`;
};

function animCount(el) {
  const target = parseFloat(el.dataset.count), short = el.dataset.fmt === 's';
  const pre = el.dataset.pre||'', suf = el.dataset.suf||'';
  let start = null;
  const ease = t => t<.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2;
  (function step(ts){
    if (!start) start = ts;
    const p = Math.min((ts-start)/1400,1), val = target*ease(p);
    let s;
    if (short) {
      if(target>=1e9) s=(val/1e9).toFixed(1).replace(/\.0$/,'')+'B';
      else if(target>=1e6) s=(val/1e6).toFixed(1).replace(/\.0$/,'')+'M';
      else if(target>=1e3) s=(val/1e3).toFixed(1).replace(/\.0$/,'')+'k';
      else s=Math.round(val).toLocaleString();
    } else s = Math.round(val).toLocaleString();
    el.textContent = pre+s+suf;
    if (p<1) requestAnimationFrame(step);
  })(performance.now());
}

const hide = id => { const e=document.getElementById(id); if(e) e.style.display='none'; };
const setBadge = (id, delta) => {
  const el = document.getElementById(id); if (!el) return;
  if (!delta) { el.style.display='none'; return; }
  el.textContent = delta.up ? '↑ Growing' : '↓ Declining';
  el.className = 'badge '+(delta.up?'b-up':'b-dn');
};

// Metric card with optional progress bar showing growth since start
function mCard(label, data, opts={}) {
  if (!data || !v(data.now)) return '';
  const isNum = typeof data.now === 'number';
  const valHtml = isNum
    ? `<div class="m-val${opts.sm?' sm':''}" data-count="${data.now}" data-fmt="${opts.short?'s':''}">${fmt(data.now)}</div>`
    : `<div class="m-val sm">${data.now}</div>`;

  let progHtml = '';
  if (opts.progress && isNum && v(data.start) && typeof data.start === 'number' && data.start > 0 && data.now > 0) {
    const pct = Math.min(100, Math.round(((data.now - data.start) / data.now) * 100));
    progHtml = `<div class="prog-wrap">
      <div class="prog-row">
        <div class="prog-bg"><div class="prog-fill" data-pct="${pct}"></div></div>
        <div class="prog-label">${pct}% growth</div>
      </div>
    </div>`;
  }

  return `<div class="mcard">
    <div class="m-lbl">${label}</div>
    ${valHtml}
    <div class="m-deltas">
      ${dBadge(data.now, data.lw,    'vs last week')}
      ${dBadge(data.now, data.start, 'vs campaign start')}
    </div>
    ${progHtml}
  </div>`;
}

// Overview big card
function ovCard(label, data) {
  if (!data || !v(data.now)) return '';
  const isNum = typeof data.now === 'number';

  let chip = '';
  if (isNum && v(data.start) && typeof data.start === 'number' && data.start > 0) {
    const pct = Math.round(((data.now - data.start) / data.start) * 100);
    if (pct !== 0) chip = `<div class="ov-chip">${pct>0?'+':''}${pct}% since start</div>`;
  }

  const valHtml = isNum
    ? `<div class="ov-val" data-count="${data.now}" data-fmt="s">${fmt(data.now)}</div>`
    : `<div class="ov-val" style="font-size:44px;letter-spacing:-2px">${data.now}</div>`;

  return `<div class="ov-card">
    ${chip}
    <div class="ov-lbl">${label}</div>
    ${valHtml}
    <div class="ov-deltas">
      ${dBadge(data.now, data.lw,    'vs last week')}
      ${dBadge(data.now, data.start, 'vs campaign start')}
    </div>
  </div>`;
}

// ── SCROLL REVEAL ────────────────────────────────────────────────────────────
const ro = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (!e.isIntersecting) return;
    e.target.classList.add('on');
    e.target.querySelectorAll('[data-count]').forEach(animCount);
    e.target.querySelectorAll('.prog-fill[data-pct]').forEach(b => setTimeout(()=>b.style.width=b.dataset.pct+'%', 300));
    ro.unobserve(e.target);
  });
}, { threshold: 0.06 });

// ── PIN ──────────────────────────────────────────────────────────────────────
const pins = [0,1,2,3].map(i => document.getElementById('p'+i));
document.getElementById('gateSub').textContent = D.client + ' — Enter your access code';
pins.forEach((inp, i) => {
  inp.addEventListener('input', () => {
    inp.value = inp.value.replace(/\D/,'');
    if (inp.value && i < 3) pins[i+1].focus();
    if (pins.every(p => p.value)) checkPin();
  });
  inp.addEventListener('keydown', e => {
    if (e.key==='Backspace' && !inp.value && i>0) pins[i-1].focus();
  });
});
pins[0].focus();

function checkPin() {
  if (pins.map(p=>p.value).join('') === String(D.pin)) {
    const gate = document.getElementById('gate');
    gate.classList.add('gone');
    setTimeout(() => gate.style.display='none', 400);
    if (!D.published) { document.getElementById('np').classList.add('show'); return; }
    buildDash();
  } else {
    document.getElementById('pinErr').textContent = 'Incorrect code — please try again.';
    pins.forEach(p => { p.value=''; p.style.borderColor='var(--red)'; setTimeout(()=>p.style.borderColor='',900); });
    pins[0].focus();
  }
}

// ── BUILD DASHBOARD ──────────────────────────────────────────────────────────
function buildDash() {
  ['hdr','main','foot'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.style.display = id === 'hdr' ? 'flex' : 'block';
  });
  document.getElementById('hdrName').textContent = D.client;
  document.getElementById('hdrWeek').textContent = `Week ${D.week} · ${D.weekDate}`;
  document.getElementById('footWeek').textContent = D.weekDate;
  if (D.clientLogo) {
    const cl = document.getElementById('hdrCl'); cl.src = D.clientLogo; cl.style.display='block';
    document.getElementById('hdrDiv').style.display='block';
  }
  buildOverview();
  buildX();
  buildDiscord();
  buildCookie();
  buildGrowth();
  buildMindshare();
  document.querySelectorAll('.reveal').forEach(el => ro.observe(el));
}

// ── OVERVIEW ─────────────────────────────────────────────────────────────────
function buildOverview() {
  const ov = D.overview;
  if (!ov) { hide('secOv'); return; }
  let html = '';
  html += ovCard('X Followers',     ov.followers);
  html += ovCard('Discord Members', ov.discord);
  html += ovCard('Cookie3 Score',   ov.cookie);
  html += ovCard('Collaborations',  ov.collabs);
  document.getElementById('ovGrid').innerHTML = html;
  const d = numDelta(ov.followers?.now, ov.followers?.lw);
  if (d) { const el=document.getElementById('bdgOv'); el.textContent=d.up?'↑ Growing':'↓ Declining'; el.className='badge '+(d.up?'b-up':'b-dn'); }
  if (!html) hide('secOv');
}

// ── X / TWITTER ──────────────────────────────────────────────────────────────
function buildX() {
  const x = D.x;
  if (!x) { hide('secX'); return; }
  let html = '';
  html += mCard('X Followers',      x.followers,   {short:true});
  html += mCard('Impressions',      x.impressions, {short:true});
  html += mCard('Engagements',      x.engagements, {short:true});
  html += mCard('Verified Followers',x.verified,   {short:true});
  html += mCard('Mutual Followers', x.mutual,      {short:true});
  document.getElementById('xMetrics').innerHTML = html;
  setBadge('bdgX', numDelta(x.followers?.now, x.followers?.lw));
  if (!html) hide('secX');
}

// ── DISCORD ──────────────────────────────────────────────────────────────────
function buildDiscord() {
  const dc = D.discord;
  if (!dc) { hide('secDiscord'); return; }

  let stats = '';
  stats += mCard('Discord Members',       dc.members,  {short:true});
  stats += mCard('Total Discord Messages',dc.messages, {short:true});
  document.getElementById('discordStats').innerHTML = stats;

  if (dc.topEngagers?.length) {
    const pills = dc.topEngagers.map((h,i) =>
      `<div class="eng-pill"><div class="eng-num">${i+1}</div>${h}</div>`
    ).join('');
    document.getElementById('discordEng').innerHTML = `
      <div class="mcard" style="height:100%">
        <div class="m-lbl">Top Engagers</div>
        <div class="eng-list">${pills}</div>
      </div>`;
  }

  setBadge('bdgDiscord', numDelta(dc.members?.now, dc.members?.lw));
  if (!stats) hide('secDiscord');
}

// ── COOKIE3 ──────────────────────────────────────────────────────────────────
function buildCookie() {
  const ck = D.cookie3;
  if (!ck || !v(ck.score?.now)) { hide('secCookie'); return; }
  const score = ck.score.now;
  const color = score >= 70 ? '#88F802' : score >= 50 ? '#f5a623' : '#ff4444';
  const label = score >= 70 ? 'Strong' : score >= 50 ? 'Moderate' : 'Needs Work';
  const bCls  = score >= 70 ? 'b-up' : score >= 50 ? 'b-neu' : 'b-dn';
  document.getElementById('bdgCookie').textContent = label;
  document.getElementById('bdgCookie').className   = 'badge ' + bCls;

  document.getElementById('cookieGauge').innerHTML = `
    <div class="gauge-card">
      <canvas class="gauge-canvas" id="cookieCvs" width="200" height="114"></canvas>
      <div class="gauge-score" style="color:${color}" data-count="${score}">${score}</div>
      <div class="gauge-sub">out of 100</div>
      <div class="gauge-deltas">
        ${dBadge(score, ck.score.lw,    'vs last week')}
        ${dBadge(score, ck.score.start, 'vs campaign start')}
      </div>
    </div>`;

  let metrics = '';
  metrics += mCard('Smart Followers',       ck.smart,     {short:true});
  metrics += mCard('Smart Reach',           ck.reach);
  metrics += mCard('Avg. Views / Post',     ck.viewsPost, {short:true});
  metrics += mCard('Avg. Engagement / Tweet',ck.engTweet);
  document.getElementById('cookieMetrics').innerHTML = metrics;

  setTimeout(() => {
    const cvs = document.getElementById('cookieCvs'); if (!cvs) return;
    const ctx = cvs.getContext('2d');
    const cx=100,cy=108,r=86,lw=13;
    ctx.clearRect(0,0,200,114);
    ctx.beginPath(); ctx.arc(cx,cy,r,Math.PI,2*Math.PI);
    ctx.strokeStyle='#1a1a1a'; ctx.lineWidth=lw; ctx.lineCap='round'; ctx.stroke();
    ctx.beginPath(); ctx.arc(cx,cy,r,Math.PI,Math.PI+(score/100)*Math.PI);
    ctx.strokeStyle=color; ctx.lineWidth=lw; ctx.lineCap='round'; ctx.stroke();
  }, 300);
}

// ── GROWTH ───────────────────────────────────────────────────────────────────
function buildGrowth() {
  const g = D.growth;
  if (!g) { hide('secGrowth'); return; }
  let html = '';
  html += mCard('Collaborations',  g.collabs);
  html += mCard('Registered Users',g.registered, {short:true});
  html += mCard('DAU',             g.dau,        {short:true});
  html += mCard('MAU',             g.mau,        {short:true});
  document.getElementById('growthMetrics').innerHTML = html;
  setBadge('bdgGrowth', numDelta(g.registered?.now, g.registered?.lw));
  if (!html) hide('secGrowth');
}

// ── MINDSHARE ────────────────────────────────────────────────────────────────
function buildMindshare() {
  const ms = D.mindshare;
  if (!ms) { hide('secMind'); return; }
  let html = '';
  html += mCard('Unique Engagers', ms.uniqueEngagers, {short:true, progress:true});
  html += mCard('Posts',           ms.posts,          {progress:true});
  html += mCard('Quote Posts',     ms.quotePosts,     {progress:true});
  html += mCard('Impressions',     ms.impressions,    {short:true, progress:true});
  document.getElementById('mindMetrics').innerHTML = html;
  setBadge('bdgMind', numDelta(ms.impressions?.now, ms.impressions?.lw));
  if (!html) hide('secMind');
}

// ── INIT ─────────────────────────────────────────────────────────────────────
const SHEET_URL = "";
if (SHEET_URL) {
  const loadEl = document.getElementById('loading'), gateEl = document.getElementById('gate');
  loadEl.style.display='flex'; gateEl.style.display='none';
  fetch(SHEET_URL+'?t='+Date.now())
    .then(r=>{ if(!r.ok) throw new Error(); return r.text(); })
    .then(text=>{ /* future: parse and inject */ loadEl.classList.add('gone'); setTimeout(()=>{ loadEl.style.display='none'; gateEl.style.display='flex'; pins[0].focus(); },400); })
    .catch(()=>{ loadEl.classList.add('gone'); setTimeout(()=>{ loadEl.style.display='none'; gateEl.style.display='flex'; pins[0].focus(); },400); });
} else {
  document.getElementById('gateSub').textContent = D.client + ' — Enter your access code';
}
</script>
